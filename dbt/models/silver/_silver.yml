version: 2

sources:
  - name: bronze
    description: "Raw Contoso data loaded from parquet files into the Lakehouse"
    database: contoso_lakehouse   # Lakehouse SQL endpoint (cross-database source)
    schema: dbo
    tables:
      - name: bronze_sales
        description: "Raw sales/orders fact table"
      - name: bronze_customer
        description: "Raw customer dimension"
      - name: bronze_product
        description: "Raw product dimension"
      - name: bronze_store
        description: "Raw store dimension"
      - name: bronze_date
        description: "Raw date dimension"

models:
  - name: stg_sales
    description: "Staged sales table — typed and cleaned from bronze_sales"
    columns:
      - name: order_key
        description: "Unique order identifier"
        tests:
          - not_null
      - name: line_number
        description: "Line number within the order"
        tests:
          - not_null
      - name: order_date
        description: "Date the order was placed"
        tests:
          - not_null
      - name: customer_key
        tests:
          - not_null
      - name: store_key
        tests:
          - not_null
      - name: product_key
        tests:
          - not_null

  - name: stg_customer
    description: "Staged customer dimension — typed and cleaned from bronze_customer"
    columns:
      - name: customer_key
        description: "Unique customer identifier"
        tests:
          - not_null
          - unique
      - name: continent
        description: "Continent where the customer is located (used for serving layer filters)"
        tests:
          - not_null

  - name: stg_product
    description: "Staged product dimension — typed and cleaned from bronze_product"
    columns:
      - name: product_key
        description: "Unique product identifier"
        tests:
          - not_null
          - unique

  - name: stg_store
    description: "Staged store dimension — typed and cleaned from bronze_store"
    columns:
      - name: store_key
        description: "Unique store identifier"
        tests:
          - not_null
          - unique
